name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: System deps (ffmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests (integration skipped by marker)
        run: pytest -v

  lint:
    name: ruff
    runs-on: ubuntu-latest
    # No continue-on-error: per the coding standard (rule 15) a PEP 8 / lint
    # violation must BLOCK merging, exactly like a failing test. Both the
    # lint check and the format check have to exit 0 for this job to pass.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ruff
        run: pip install ruff
      # Lint the library package and the test suite. The repo's ruff config
      # in pyproject.toml is the single source of truth for the rule set.
      - name: Run ruff check
        run: ruff check audio_helper tests
      # Enforce formatting too so style never drifts between contributors.
      - name: Run ruff format check
        run: ruff format --check audio_helper tests
